<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>The Brief</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#09090f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Brief" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090f;
      --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.055);
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.12);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --ai: #38bdf8;
      --ai-dim: rgba(56,189,248,0.12);
      --ai-glow: rgba(56,189,248,0.22);
      --music: #f59e0b;
      --music-dim: rgba(245,158,11,0.12);
      --music-glow: rgba(245,158,11,0.22);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--text-primary);
      font-family: var(--sans); -webkit-font-smoothing: antialiased;
      min-height: 100%; overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: var(--sans); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    #app { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 640px; padding: 0 16px 80px; }

    /* Header */
    header { padding: 48px 0 32px; }
    .date-label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-family: var(--serif); font-size: clamp(36px,10vw,52px); font-weight: 400; letter-spacing: -.01em; line-height: 1; }
    .accent-line { width: 32px; height: 1px; background: var(--ai); margin-top: 16px; transition: background .3s; }
    .accent-line.music { background: var(--music); }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 12px 16px; border-radius: var(--radius);
      background: transparent; border: 1px solid var(--border);
      text-align: left; transition: all .25s ease; cursor: pointer;
    }
    .tab.active-ai { background: var(--surface); border-color: var(--ai); box-shadow: 0 0 20px var(--ai-glow); color: var(--ai); }
    .tab.active-music { background: var(--surface); border-color: var(--music); box-shadow: 0 0 20px var(--music-glow); color: var(--music); }
    .tab:not(.active-ai):not(.active-music) { color: var(--text-muted); }
    .tab-sub { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; opacity: .7; margin-bottom: 3px; }
    .tab-label { font-size: 13px; font-weight: 500; }

    /* Meta bar */
    .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; height: 28px; }
    .updated { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
    .refresh-btn {
      font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
      display: flex; align-items: center; gap: 6px; transition: color .3s;
      color: var(--ai);
    }
    .refresh-btn.music { color: var(--music); }
    .refresh-btn:disabled { opacity: .4; cursor: not-allowed; }
    .spin { display: inline-block; animation: spin .8s linear infinite; }

    /* Cards */
    .cards { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      transition: background .2s; animation: fadeUp .4s ease forwards; opacity: 0;
    }
    .card:hover { background: var(--surface-hover); }
    .card.ai { border-left: 3px solid var(--ai); }
    .card.music { border-left: 3px solid var(--music); }
    .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card-num { font-family: var(--mono); font-size: 11px; letter-spacing: .08em; opacity: .8; }
    .card-num.ai { color: var(--ai); }
    .card-num.music { color: var(--music); }
    .card-source {
      font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
      padding: 2px 8px; border-radius: 20px; color: var(--text-muted);
    }
    .card-source.ai { background: var(--ai-dim); }
    .card-source.music { background: var(--music-dim); }
    .card-title { font-family: var(--serif); font-size: 18px; font-weight: 500; line-height: 1.35; color: var(--text-primary); margin-bottom: 10px; }
    .card-summary { font-family: var(--sans); font-size: 13.5px; line-height: 1.65; color: var(--text-secondary); font-weight: 300; margin-bottom: 10px; }
    .card-why {
      font-family: var(--serif); font-size: 13px; font-style: italic;
      line-height: 1.55; opacity: .8; margin-bottom: 14px;
      padding-left: 10px; border-left: 1px solid currentColor;
    }
    .card-why.ai { color: var(--ai); }
    .card-why.music { color: var(--music); }
    .card-link { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; opacity: .75; transition: opacity .15s; }
    .card-link:hover { opacity: 1; }
    .card-link.ai { color: var(--ai); }
    .card-link.music { color: var(--music); }

    /* Skeleton */
    .skeleton { display: flex; flex-direction: column; gap: 12px; }
    .skeleton-item {
      height: 120px; border-radius: var(--radius);
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.07) 50%, rgba(255,255,255,.04) 75%);
      background-size: 200% auto; animation: shimmer 1.5s linear infinite;
    }

    /* Empty */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-title { font-family: var(--serif); font-size: 22px; color: var(--text-secondary); margin-bottom: 8px; font-style: italic; }
    .empty-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .gen-btn {
      padding: 10px 24px; border-radius: 40px; background: var(--surface);
      border: 1px solid var(--border-strong); color: var(--text-primary);
      font-family: var(--mono); font-size: 13px; letter-spacing: .06em;
      transition: opacity .2s;
    }
    .gen-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Error */
    .error {
      padding: 12px 16px; border-radius: var(--radius);
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
      color: #fca5a5; font-size: 13px; margin-bottom: 16px;
    }

    /* Footer */
    .footer { margin-top: 40px; font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-align: center; letter-spacing: .06em; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <div class="container">
    <header>
      <p class="date-label" id="dateLabel"></p>
      <h1>The Brief</h1>
      <div class="accent-line" id="accentLine"></div>
    </header>

    <div class="tabs">
      <button class="tab active-ai" id="tabAI" onclick="switchTab('ai-safety')">
        <div class="tab-sub">Morning</div>
        <div class="tab-label">AI Safety</div>
      </button>
      <button class="tab" id="tabMusic" onclick="switchTab('music')">
        <div class="tab-sub">Evening</div>
        <div class="tab-label">Music Biz</div>
      </button>
    </div>

    <div class="meta">
      <span class="updated" id="updatedLabel"></span>
      <button class="refresh-btn ai" id="refreshBtn" onclick="handleRefresh()">
        <span id="refreshIcon">↻</span>
        <span id="refreshLabel">REFRESH</span>
      </button>
    </div>

    <div id="errorBox" class="error" style="display:none"></div>
    <div id="content"></div>
  </div>
</div>

<script>
  let activeTab = 'ai-safety';
  let briefs = { 'ai-safety': null, music: null };
  let loading = true;
  let refreshing = false;

  function timeAgo(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const h = Math.floor(diff / 3600000);
    const m = Math.floor(diff / 60000);
    if (h > 0) return h + 'h ago';
    if (m > 0) return m + 'm ago';
    return 'just now';
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }

  function setError(msg) {
    const box = document.getElementById('errorBox');
    if (msg) { box.textContent = msg; box.style.display = 'block'; }
    else box.style.display = 'none';
  }

  function switchTab(tab) {
    activeTab = tab;
    const isAI = tab === 'ai-safety';

    document.getElementById('tabAI').className = 'tab ' + (isAI ? 'active-ai' : '');
    document.getElementById('tabMusic').className = 'tab ' + (!isAI ? 'active-music' : '');
    document.getElementById('accentLine').className = 'accent-line' + (isAI ? '' : ' music');
    document.getElementById('refreshBtn').className = 'refresh-btn ' + (isAI ? 'ai' : 'music');

    renderContent();
    updateMeta();
  }

  function updateMeta() {
    const brief = briefs[activeTab];
    const updated = brief?.updatedAt;
    document.getElementById('updatedLabel').textContent = updated ? 'Updated ' + timeAgo(updated) : (loading ? '' : 'Not generated yet');
  }

  function renderSkeleton() {
    const items = [1,2,3,4,5].map(i =>
      `<div class="skeleton-item" style="animation-delay:${i*0.1}s"></div>`
    ).join('');
    document.getElementById('content').innerHTML = `<div class="skeleton">${items}</div>`;
  }

  function renderEmpty() {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <p class="empty-title">No brief yet for today</p>
        <p class="empty-sub">Generate your first brief to get started</p>
        <button class="gen-btn" onclick="handleRefresh()" id="genBtn">Generate Brief</button>
      </div>`;
  }

  function renderCards(items) {
    const t = activeTab;
    const cls = t === 'ai-safety' ? 'ai' : 'music';
    const cards = items.map((item, i) => {
      const num = String(i+1).padStart(2,'0');
      return `
        <div class="card ${cls}" style="animation-delay:${i*0.07}s">
          <div class="card-meta">
            <span class="card-num ${cls}">${num}</span>
            <span class="card-source ${cls}">${item.source || ''}</span>
          </div>
          <h3 class="card-title">${item.title || ''}</h3>
          <p class="card-summary">${item.summary || ''}</p>
          ${item.why ? `<p class="card-why ${cls}">${item.why}</p>` : ''}
          ${item.url ? `<a class="card-link ${cls}" href="${item.url}" target="_blank" rel="noopener">READ FULL ARTICLE →</a>` : ''}
        </div>`;
    }).join('');
    document.getElementById('content').innerHTML = `<div class="cards">${cards}</div>`;
  }

  function renderContent() {
    if (loading) { renderSkeleton(); return; }
    const brief = briefs[activeTab];
    const items = brief?.items || [];
    if (!brief || brief.empty || items.length === 0) { renderEmpty(); return; }
    renderCards(items);
  }

  async function fetchBrief(category) {
    const res = await fetch('/api/briefs?category=' + category);
    const data = await res.json();
    briefs[category] = data;
  }

  async function handleRefresh() {
    if (refreshing) return;
    refreshing = true;
    setError(null);
    document.getElementById('refreshIcon').className = 'spin';
    document.getElementById('refreshLabel').textContent = 'REFRESHING…';
    document.getElementById('refreshBtn').disabled = true;

    try {
      const res = await fetch('/api/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: activeTab }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Refresh failed');
      }
      await fetchBrief(activeTab);
      renderContent();
      updateMeta();
    } catch (err) {
      setError(err.message);
    } finally {
      refreshing = false;
      document.getElementById('refreshIcon').className = '';
      document.getElementById('refreshLabel').textContent = 'REFRESH';
      document.getElementById('refreshBtn').disabled = false;
    }
  }

  async function init() {
    document.getElementById('dateLabel').textContent = formatDate(new Date());
    renderSkeleton();
    try {
      await Promise.all([fetchBrief('ai-safety'), fetchBrief('music')]);
    } catch(e) { setError(e.message); }
    loading = false;
    renderContent();
    updateMeta();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  init();
</script>
</body>
</html>
